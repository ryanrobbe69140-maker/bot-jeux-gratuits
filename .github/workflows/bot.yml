name: Traqueur de jeux gratuits

on:
  schedule:
    # Toutes les 30 min entre 10h et 17h UTC = 12h a 19h heure francaise (ete)
    - cron: '*/30 10-17 * * *'
  workflow_dispatch: {}  # bouton pour lancer a la main depuis l'onglet Actions

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dependances
        run: pip install requests

      - name: Lancer le script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Sauvegarder la memoire
        run: |
          git config user.name "bot-jeux-gratuits"
          git config user.email "bot@users.noreply.github.com"
          git add memoire.json
          git commit -m "maj memoire" || echo "Rien de nouveau"
          git push
